# हे फाईल Azure Static Web Apps साठी Automatic Deployment करते
# जेव्हा तुम्ही GitHub वर code push करता, तेव्हा हे automatically चालते

name: Azure Static Web Apps CI/CD

# कधी हे workflow चालवायचे ते सांगते
on:
  push:
    branches:
      - main # जेव्हा main branch वर push होते तेव्हा चालवा
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main # जेव्हा main branch साठी Pull Request येते तेव्हा चालवा

# मुख्य काम - Build आणि Deploy
jobs:
  build_and_deploy_job:
    # फक्त push किंवा open PR साठी चालवा (closed PR साठी नाही)
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')

    # Ubuntu Linux machine वर चालवा
    runs-on: ubuntu-latest
    name: Build and Deploy Job

    steps:
      # Step 1: तुमचा code GitHub वरून download करा
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false

      # Step 2: Build करा आणि Azure वर Deploy करा
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          # Azure शी connect करण्यासाठी secret token (GitHub Secrets मध्ये stored आहे)
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_PROUD_PEBBLE_067E3A310 }}

          # GitHub token - PR comments साठी वापरतो
          repo_token: ${{ secrets.GITHUB_TOKEN }}

          # काय करायचे - upload म्हणजे deploy करा
          action: 'upload'

          ###### Build Configuration - तुमच्या app प्रमाणे configure केले आहे ######

          # तुमचा React code कुठे आहे (root folder मध्ये)
          app_location: '/'

          # API code कुठे आहे (आत्ता नाही म्हणून blank)
          api_location: ''

          # Build झाल्यावर files कुठे तयार होतात (Vite 'dist' folder वापरते)
          output_location: 'dist'

          ###### Configuration संपला ######

  # जेव्हा Pull Request बंद होते तेव्हा preview environment काढून टाका
  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_PROUD_PEBBLE_067E3A310 }}
          action: 'close'

# ========================================
# काय होते Step by Step:
# ========================================
# 1. तुम्ही 'git push origin main' करता
# 2. GitHub हे workflow file detect करते
# 3. Ubuntu machine वर code download होतो
# 4. npm install चालते (dependencies install होतात)
# 5. npm run build चालते (dist folder तयार होते)
# 6. dist folder Azure वर upload होते
# 7. तुमची website live होते!
#
# URL: https://proud-pebble-067e3a310.4.azurestaticapps.net
# ========================================
